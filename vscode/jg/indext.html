<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tower Defense ULTRA</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#222;
}

#ui{
position:absolute;
top:10px;
left:10px;
}

button{
margin:2px;
}
</style>

</head>

<body>

<div id="ui">

Gold: <span id="gold">200</span>
Lives: <span id="lives">20</span>
Wave: <span id="wave">1</span>

<br><br>

<button onclick="selectTower('basic')">Basic</button>
<button onclick="selectTower('sniper')">Sniper</button>
<button onclick="selectTower('ice')">Ice</button>
<button onclick="selectTower('poison')">Poison</button>
<button onclick="selectTower('electric')">Electric</button>
<button onclick="selectTower('bomb')">Bomb</button>

<br><br>

<button onclick="meteor()">Meteor</button>
<button onclick="freeze()">Freeze</button>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = 900
canvas.height = 600

let gold = 200
let lives = 20
let wave = 1

let selectedTower="basic"

const towers=[]
const enemies=[]
const bullets=[]

const path=[
{x:0,y:300},
{x:200,y:300},
{x:200,y:150},
{x:500,y:150},
{x:500,y:450},
{x:900,y:450}
]

function selectTower(type){
selectedTower=type
}

canvas.onclick=e=>{

let rect=canvas.getBoundingClientRect()
let x=e.clientX-rect.left
let y=e.clientY-rect.top

let clickedTower = towers.find(t=>Math.hypot(t.x-x,t.y-y)<15)

if(clickedTower){
upgradeTower(clickedTower)
return
}

let cost=50

if(selectedTower=="sniper") cost=80
if(selectedTower=="ice") cost=70
if(selectedTower=="poison") cost=70
if(selectedTower=="electric") cost=90
if(selectedTower=="bomb") cost=120

if(gold<cost) return

gold-=cost

towers.push({
x,y,
type:selectedTower,
range:120,
cooldown:0,
level:1
})

updateUI()

}

function upgradeTower(t){

let cost=60*t.level

if(gold<cost) return

gold-=cost
t.level++

updateUI()

}

function spawnEnemy(type){

let hp=30
let speed=1

if(type=="fast"){hp=20;speed=2}
if(type=="tank"){hp=100;speed=0.6}
if(type=="regen"){hp=50}
if(type=="split"){hp=40}
if(type=="boss"){hp=400;speed=0.5}

enemies.push({
x:path[0].x,
y:path[0].y,
hp,
maxhp:hp,
speed,
type,
pathIndex:0,
slow:1,
poison:0
})

}

function startWave(){

let total=10+wave*2

for(let i=0;i<total;i++){

setTimeout(()=>{

let r=Math.random()

if(wave%5==0 && i==total-1) spawnEnemy("boss")
else if(r<0.2) spawnEnemy("fast")
else if(r<0.35) spawnEnemy("tank")
else if(r<0.5) spawnEnemy("regen")
else if(r<0.65) spawnEnemy("split")
else spawnEnemy("normal")

},i*700)

}

}

startWave()

function meteor(){

if(gold<100) return

gold-=100

enemies.forEach(e=>{
e.hp-=80
})

updateUI()

}

function freeze(){

if(gold<80) return

gold-=80

enemies.forEach(e=>{
e.slow=0.3
})

updateUI()

}

function shoot(t,target){

let damage=10*t.level

if(t.type=="sniper") damage=40*t.level
if(t.type=="electric") damage=15*t.level
if(t.type=="bomb") damage=25*t.level

bullets.push({
x:t.x,
y:t.y,
target,
damage,
type:t.type
})

}

function update(){

towers.forEach(t=>{

t.cooldown--

if(t.cooldown<=0){

let target=enemies.find(e=>Math.hypot(e.x-t.x,e.y-t.y)<t.range)

if(target){

shoot(t,target)

t.cooldown=60-5*t.level

}

}

})

bullets.forEach((b,i)=>{

if(!b.target){bullets.splice(i,1);return}

let dx=b.target.x-b.x
let dy=b.target.y-b.y
let dist=Math.hypot(dx,dy)

b.x+=dx/dist*6
b.y+=dy/dist*6

if(dist<6){

b.target.hp-=b.damage

if(b.type=="ice") b.target.slow=0.5
if(b.type=="poison") b.target.poison=200

if(b.type=="bomb"){

enemies.forEach(e=>{
if(Math.hypot(e.x-b.target.x,e.y-b.target.y)<60){
e.hp-=20
}
})

}

bullets.splice(i,1)

}

})

enemies.forEach((e,i)=>{

if(e.poison>0){
e.hp-=0.05
e.poison--
}

if(e.type=="regen"){
e.hp+=0.03
}

let target=path[e.pathIndex+1]

if(!target){

lives--
enemies.splice(i,1)
updateUI()
return

}

let dx=target.x-e.x
let dy=target.y-e.y
let dist=Math.hypot(dx,dy)

if(dist<2){
e.pathIndex++
}else{

e.x+=dx/dist*e.speed*e.slow
e.y+=dy/dist*e.speed*e.slow

}

e.slow=1

if(e.hp<=0){

if(e.type=="split"){
spawnEnemy("fast")
spawnEnemy("fast")
}

gold+=15
enemies.splice(i,1)

updateUI()

}

})

if(enemies.length==0){

wave++
document.getElementById("wave").innerText=wave
startWave()

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="yellow"
ctx.lineWidth=6

ctx.beginPath()
ctx.moveTo(path[0].x,path[0].y)

for(let p of path){
ctx.lineTo(p.x,p.y)
}

ctx.stroke()

towers.forEach(t=>{

if(t.type=="basic") ctx.fillStyle="cyan"
if(t.type=="sniper") ctx.fillStyle="white"
if(t.type=="ice") ctx.fillStyle="blue"
if(t.type=="poison") ctx.fillStyle="green"
if(t.type=="electric") ctx.fillStyle="purple"
if(t.type=="bomb") ctx.fillStyle="orange"

ctx.beginPath()
ctx.arc(t.x,t.y,12,0,Math.PI*2)
ctx.fill()

})

bullets.forEach(b=>{
ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()
})

enemies.forEach(e=>{

ctx.fillStyle="red"

if(e.type=="fast") ctx.fillStyle="orange"
if(e.type=="tank") ctx.fillStyle="brown"
if(e.type=="regen") ctx.fillStyle="pink"
if(e.type=="split") ctx.fillStyle="yellow"
if(e.type=="boss") ctx.fillStyle="purple"

ctx.beginPath()
ctx.arc(e.x,e.y,12,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="lime"
ctx.fillRect(e.x-15,e.y-20,30*(e.hp/e.maxhp),4)

})

}

function updateUI(){

document.getElementById("gold").innerText=gold
document.getElementById("lives").innerText=lives

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
