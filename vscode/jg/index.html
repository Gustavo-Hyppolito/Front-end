<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Survival Insano Auto Shockwave</title>
<style>
body { margin:0; overflow:hidden; background:#0a0a0a; color:white; font-family:Arial; }
#ui { position:absolute; top:10px; left:10px; font-size:18px; }
#levelUp {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:20px;
    display:none;
    border:2px solid #555;
}
button {
    display:block;
    margin:10px;
    padding:10px;
    background:#333;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover { background:#555; }
</style>
</head>
<body>

<div id="ui">
Vida: <span id="vida">100</span> |
XP: <span id="xp">0</span> |
Level: <span id="level">1</span>
</div>

<div id="levelUp"></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
let mouse = { x:0, y:0 };
let bullets = [];
let enemies = [];
let clones = [];
let ghosts = [];

let xp = 0;
let level = 1;
let xpNeeded = 50;
let health = 100;
let paused = false;

let shockwaveTimer = 0;
let shockwaveCooldown = 5000;
let shockwaveRadius = 0;

const player = {
    x: canvas.width/2,
    y: canvas.height/2,
    size: 20,
    speed: 4,
    fireRate: 400,
    bulletSpeed: 8,
    damage: 1
};

document.addEventListener("keydown", e=> keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e=> keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousemove", e=>{
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

function shoot(){
    if(paused) return;

    const angle = Math.atan2(mouse.y-player.y, mouse.x-player.x);

    bullets.push({
        x: player.x,
        y: player.y,
        dx: Math.cos(angle)*player.bulletSpeed,
        dy: Math.sin(angle)*player.bulletSpeed,
        size:5
    });

    clones.forEach(c=>{
        const cx = player.x + Math.cos(c.angle)*c.distance;
        const cy = player.y + Math.sin(c.angle)*c.distance;
        const a = Math.atan2(mouse.y-cy, mouse.x-cx);

        bullets.push({
            x: cx,
            y: cy,
            dx: Math.cos(a)*player.bulletSpeed,
            dy: Math.sin(a)*player.bulletSpeed,
            size:5
        });
    });
}

let shootInterval = setInterval(shoot, player.fireRate);

function spawnEnemy(){
    const angle = Math.random()*Math.PI*2;
    const radius = Math.max(canvas.width, canvas.height);
    enemies.push({
        x: player.x + Math.cos(angle)*radius,
        y: player.y + Math.sin(angle)*radius,
        size:20,
        speed: 1 + level*0.15,
        hp: 3 + level
    });
}
setInterval(spawnEnemy, 1000);

function shockwave(){
    shockwaveRadius = 150;

    enemies.forEach((e,i)=>{
        const dist = Math.hypot(player.x-e.x, player.y-e.y);
        if(dist < shockwaveRadius){
            e.hp -= 8;
            if(e.hp <= 0){
                enemies.splice(i,1);
                xp += 10;
                document.getElementById("xp").textContent = xp;
                if(xp >= xpNeeded) levelUp();
            }
        }
    });
}

function addClone(){
    clones.push({ angle:0, distance:60 });
}

function addGhost(){
    ghosts.push({ x:player.x, y:player.y, speed:3 });
}

function levelUp(){
    paused = true;
    level++;
    xp = 0;
    xpNeeded += 30;
    document.getElementById("level").textContent = level;

    const upgrades = [
        {name:"⚡ Velocidade +1", effect:()=>player.speed+=1},
        {name:"🔥 Dano +1", effect:()=>player.damage+=1},
        {name:"🚀 Tiro mais rápido", effect:()=>{
            if(player.fireRate>100){
                player.fireRate-=50;
                clearInterval(shootInterval);
                shootInterval=setInterval(shoot,player.fireRate);
            }
        }},
        {name:"👥 Clone", effect:()=>addClone()},
        {name:"👻 Fantasma", effect:()=>addGhost()},
        {name:"🌀 Shockwave automática", effect:()=>shockwaveCooldown-=500}
    ];

    const box = document.getElementById("levelUp");
    box.innerHTML="<h2>Escolha um Upgrade</h2>";

    upgrades.sort(()=>0.5-Math.random()).slice(0,3).forEach(up=>{
        const btn=document.createElement("button");
        btn.textContent=up.name;
        btn.onclick=()=>{
            up.effect();
            box.style.display="none";
            paused=false;
        };
        box.appendChild(btn);
    });

    box.style.display="block";
}

function update(){
    if(paused) return;

    if(keys["w"]) player.y-=player.speed;
    if(keys["s"]) player.y+=player.speed;
    if(keys["a"]) player.x-=player.speed;
    if(keys["d"]) player.x+=player.speed;

    bullets.forEach((b,bi)=>{
        b.x+=b.dx;
        b.y+=b.dy;

        enemies.forEach((e,ei)=>{
            if(Math.hypot(b.x-e.x,b.y-e.y)<e.size){
                e.hp-=player.damage;
                bullets.splice(bi,1);
                if(e.hp<=0){
                    enemies.splice(ei,1);
                    xp+=10;
                    document.getElementById("xp").textContent=xp;
                    if(xp>=xpNeeded) levelUp();
                }
            }
        });
    });

    enemies.forEach(e=>{
        const angle=Math.atan2(player.y-e.y,player.x-e.x);
        e.x+=Math.cos(angle)*e.speed;
        e.y+=Math.sin(angle)*e.speed;

        if(Math.hypot(player.x-e.x,player.y-e.y)<player.size){
            health-=1;
            document.getElementById("vida").textContent=health;
            if(health<=0){
                alert("GAME OVER");
                location.reload();
            }
        }
    });

    clones.forEach(c=> c.angle+=0.05);

    ghosts.forEach(g=>{
        if(enemies.length===0) return;
        let target=enemies[0];
        enemies.forEach(e=>{
            if(Math.hypot(g.x-e.x,g.y-e.y) <
               Math.hypot(g.x-target.x,g.y-target.y))
                target=e;
        });

        const angle=Math.atan2(target.y-g.y,target.x-g.x);
        g.x+=Math.cos(angle)*g.speed;
        g.y+=Math.sin(angle)*g.speed;

        if(Math.hypot(g.x-target.x,g.y-target.y)<15){
            target.hp-=2;
        }
    });

    // Shockwave automática
    shockwaveTimer += 16;
    if(shockwaveTimer >= shockwaveCooldown){
        shockwave();
        shockwaveTimer = 0;
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);
    ctx.save();
    ctx.translate(player.x,player.y);
    ctx.rotate(angle);
    ctx.fillStyle="lime";
    ctx.fillRect(0,-10,30,20);
    ctx.restore();

    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="cyan";
    clones.forEach(c=>{
        const x=player.x+Math.cos(c.angle)*c.distance;
        const y=player.y+Math.sin(c.angle)*c.distance;
        ctx.beginPath();
        ctx.arc(x,y,10,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="purple";
    ghosts.forEach(g=>{
        ctx.beginPath();
        ctx.arc(g.x,g.y,12,0,Math.PI*2);
        ctx.fill();
    });

    // efeito visual shockwave
    if(shockwaveRadius > 0){
        ctx.beginPath();
        ctx.arc(player.x, player.y, shockwaveRadius, 0, Math.PI*2);
        ctx.strokeStyle = "cyan";
        ctx.lineWidth = 4;
        ctx.stroke();
        shockwaveRadius -= 8;
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
