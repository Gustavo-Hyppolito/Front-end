<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>

<style>

body{
margin:0;
overflow:hidden;
background:#70c5ce;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#70c5ce;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:24px;
}

</style>
</head>

<body>

<div id="ui">Score: <span id="score">0</span></div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = 400
canvas.height = 600

let score = 0

const bird = {
x:80,
y:300,
size:20,
velocity:0,
gravity:0.5,
jump:-8
}

const pipes = []

function jump(){
bird.velocity = bird.jump
}

document.addEventListener("keydown",e=>{
if(e.code=="Space") jump()
})

document.addEventListener("mousedown",jump)

function spawnPipe(){

let gap = 150

let topHeight = Math.random()*300+50

pipes.push({
x:canvas.width,
top:topHeight,
bottom:topHeight+gap,
width:60,
passed:false
})

}

setInterval(spawnPipe,1800)

function update(){

bird.velocity += bird.gravity
bird.y += bird.velocity

if(bird.y > canvas.height || bird.y < 0){
gameOver()
}

pipes.forEach((p,i)=>{

p.x -= 3

if(
bird.x + bird.size > p.x &&
bird.x < p.x + p.width &&
(
bird.y < p.top ||
bird.y + bird.size > p.bottom
)
){
gameOver()
}

if(!p.passed && p.x + p.width < bird.x){
p.passed = true
score++
document.getElementById("score").innerText = score
}

if(p.x + p.width < 0){
pipes.splice(i,1)
}

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(bird.x,bird.y,bird.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="green"

pipes.forEach(p=>{

ctx.fillRect(p.x,0,p.width,p.top)

ctx.fillRect(
p.x,
p.bottom,
p.width,
canvas.height-p.bottom
)

})

}

function gameOver(){

alert("Game Over! Score: "+score)   
location.reload()

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
